<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kataloka - Login</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/form.css">
    <link rel="stylesheet" href="css/login.css">
</head>

<body>
    <header>
        <nav>
            <div class="nav-left">
                <img src="images/Introduction.png" alt="Logo Kataloka">
            </div>
            <h1>Kataloka</h1>
            <ul class="nav-list">
                <li class="nav-list-item"><a class="nav-link" href="/">Beranda</a></li>
                <li class="nav-list-item"><a class="nav-link" href="#features">Pilihan</a></li>
                <li class="nav-list-item auth"><a class="nav-link" href="/register.html">Daftar</a></li>
            </ul>
        </nav>
    </header>

    <main class="login-container">
        <div class="form-container">
            <form class="login-form" onsubmit="return handleLogin(event)">
                <h1 class="form-title">Login</h1>
                <div class="form-field">
                    <label class="form-label">Email</label>
                    <input class="form-input" type="email" id="email" required>
                </div>
                <div class="form-field">
                    <label class="form-label">Password</label>
                    <input class="form-input" type="password" id="password" required>
                </div>
                <button class="form-button" type="submit">Sign In</button>
                <a class="form-footer-link" href="/register.html">Don't have an account? Sign up</a>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2024 Kataloka. Semua hak dilindungi.</p>
    </footer>
    
    <script src="login.js"></script>
</body>

</html>
